# =============================================================================
# nginx.conf — KeyCompute 生产环境 Nginx 配置
#
# 功能：
#   - 托管 Dioxus WASM 前端静态文件（SPA 路由 fallback）
#   - 反向代理 /api/ 请求到后端 keycompute-server:3000
#   - 支持 SSE（Server-Sent Events）流式响应
#   - 正确声明 application/wasm MIME 类型
#   - gzip 压缩（排除 WASM 二进制）
#   - 安全响应头
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    # 注意：不在此处单独添加 types{} 块，否则会完全覆盖上方 include mime.types 加载的所有类型
    # WASM 类型通过下方 .wasm location 块的 add_header Content-Type 进行覆盖，无需全局声明

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ── gzip 压缩（排除 WASM，WASM 已由 wasm-opt 优化，压缩收益低）──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    # application/wasm 故意不在此列表中

    # ── 上游后端服务（Docker Compose 服务名解析）──
    upstream keycompute_backend {
        server keycompute-server:3000;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── 安全响应头 ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── WASM 文件：生产环境 WASM 文件带内容哈希，可长期缓存 ──
        # 注意：Nginx add_header 继承规则——子级 location 一旦使用 add_header，
        # 会完全丢弃父级 server 块的所有 add_header，因此必须在每个 location 中重复安全头
        location ~* \.wasm$ {
            add_header Content-Type application/wasm;
            add_header Cache-Control "public, max-age=31536000, immutable";
            # 重复 server 级安全头（防止继承断裂）
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            try_files $uri =404;
        }

        # ── 静态资产长期缓存（JS/CSS/图片均带哈希指纹）──
        # 注意：同上，必须重复安全头
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            # 重复 server 级安全头（防止继承断裂）
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            try_files $uri =404;
        }

        # ── LLM 流式接口专用位置（超时更长，必须放在 /v1/ 通用规则之前）
        # OpenAI 兼容接口不走 /api/v1，而是直接暴露为 /v1/*
        # 将此块提前到一般 /v1/ 代理之前，确保长流请求能匹配到 600s 超时
        location /v1/chat/completions {
            proxy_pass         http://keycompute_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # 流式响应必须关闭缓冲
            proxy_buffering    off;
            proxy_cache        off;

            # SSE 流式超时：600s（10 分钟，与后端 stream_timeout_secs 一致）
            proxy_connect_timeout   10s;
            proxy_send_timeout      600s;
            proxy_read_timeout      600s;
        }

        # ── OpenAI 兼容 API 反向代理（含 SSE 流式响应支持）—— 通用规则 ──
        # 注意：/v1/chat/completions 已在上方单独配置，此处覆盖其他所有 /v1/* 请求
        location /v1/ {
            proxy_pass         http://keycompute_backend;
            proxy_http_version 1.1;

            # 转发头信息
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE / 流式响应配置
            # Connection: '' 禁止 Nginx 将 HTTP/1.1 keep-alive 转为 close
            proxy_set_header   Connection        "";
            # 关闭响应缓冲，确保 SSE 事件实时推送到客户端
            proxy_buffering    off;
            proxy_cache        off;

            # 超时配置
            # 普通 API：60s
            proxy_connect_timeout   10s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;
        }

        # ── 站内业务 API 反向代理 —— 通用规则 ──
        # 前端控制台、认证、设置等接口统一走 /api/v1/*
        location /api/ {
            proxy_pass         http://keycompute_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_buffering    off;
            proxy_cache        off;

            proxy_connect_timeout   10s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;
        }

        # ── SPA 路由 fallback ──
        # 所有未匹配静态文件的路由均返回 index.html，由前端路由处理
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── 错误页面 ──
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
