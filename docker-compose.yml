# =============================================================================
# docker-compose.yml — KeyCompute 线上部署编排
#
# 服务拓扑：
#   postgres          — PostgreSQL 数据库（keycompute-db 依赖）
#   redis             — Redis 缓存（限流、会话存储）
#   keycompute-server — Axum 后端 API 服务
#   keycompute-web    — Nginx + Dioxus WASM 前端
#
# 网络拓扑：
#   keycompute-internal — 内部网络（后端 ↔ 数据库/Redis，外部不可访问）
#   keycompute-public   — 公共网络（仅 Web 与 Server 对外暴露端口）
#
# 使用方法：
#   cp .env.example .env   # 编辑填入生产密钥
#   docker compose up -d   # 启动所有服务
#   docker compose logs -f # 实时查看日志
# =============================================================================

services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL — 主数据库
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: keycompute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycompute}
      POSTGRES_USER: ${POSTGRES_USER:-keycompute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # 性能调优（根据服务器内存酌情调整）
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycompute-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycompute} -d ${POSTGRES_DB:-keycompute}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  # ─────────────────────────────────────────────────────────────────────────
  # Redis — 缓存与限流存储
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: keycompute-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - keycompute-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ─────────────────────────────────────────────────────────────────────────
  # keycompute-server — Axum 后端 API 服务
  # ─────────────────────────────────────────────────────────────────────────
  keycompute-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: keycompute-server:latest
    container_name: keycompute-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 运行环境
      KC__ENV: production

      # 数据库配置（使用 Docker 网络内服务名解析）
      KC__DATABASE__URL: "postgres://${POSTGRES_USER:-keycompute}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-keycompute}"
      KC__DATABASE__MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      KC__DATABASE__MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-2}

      # Redis 配置
      KC__REDIS__URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      KC__REDIS__POOL_SIZE: ${REDIS_POOL_SIZE:-10}

      # 认证配置（生产环境必须修改！）
      KC__AUTH__JWT_SECRET: ${KC_JWT_SECRET}
      KC__AUTH__JWT_ISSUER: ${KC_JWT_ISSUER:-keycompute}
      KC__AUTH__JWT_EXPIRY_SECS: ${KC_JWT_EXPIRY_SECS:-3600}

      # 加密配置（API Key 加密存储，生产环境必须配置！）
      KC__CRYPTO__SECRET_KEY: ${KC_CRYPTO_SECRET_KEY}

      # 邮件服务配置
      KC__EMAIL__SMTP_HOST: ${SMTP_HOST}
      KC__EMAIL__SMTP_PORT: ${SMTP_PORT:-587}
      KC__EMAIL__SMTP_USERNAME: ${SMTP_USERNAME}
      KC__EMAIL__SMTP_PASSWORD: ${SMTP_PASSWORD}
      KC__EMAIL__FROM_ADDRESS: ${SMTP_FROM_ADDRESS}
      KC__EMAIL__FROM_NAME: ${SMTP_FROM_NAME:-KeyCompute}
      KC__EMAIL__VERIFICATION_BASE_URL: ${APP_BASE_URL:-https://example.com}

      # 服务器配置
      KC__SERVER__BIND_ADDR: "0.0.0.0"
      KC__SERVER__PORT: "3000"
    networks:
      - keycompute-internal
      - keycompute-public
    # 后端端口不对外直接暴露，通过 Nginx 代理访问
    # 如需直接调试 API，可取消下行注释：
    # ports:
    #   - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  # ─────────────────────────────────────────────────────────────────────────
  # keycompute-web — Nginx + Dioxus WASM 前端
  # ─────────────────────────────────────────────────────────────────────────
  keycompute-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: keycompute-web:latest
    container_name: keycompute-web
    restart: unless-stopped
    depends_on:
      keycompute-server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - keycompute-public
      - keycompute-internal  # Nginx 需要访问 keycompute-server，必须加入内部网络
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

# =============================================================================
# 持久化卷
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# 网络定义
# =============================================================================
networks:
  # 内部网络：Postgres/Redis/Server 之间通信，外部不可访问
  keycompute-internal:
    driver: bridge
    internal: true

  # 公共网络：Web/Server 对外暴露，Nginx 通过此网络代理后端
  keycompute-public:
    driver: bridge
